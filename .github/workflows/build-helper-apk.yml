name: Build Helper APK v6

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew :app:assembleDebug 2>&1

      - name: Find APK
        run: find . -name "*.apk" -not -path "*/intermediates/*"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CapCutHelper-v6-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: app/build/reports/
          retention-days: 7
